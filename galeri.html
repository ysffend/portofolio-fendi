<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="galeri.css">
</head>
<body>

<header class="header">
  <h1>Gallery</h1>
  <p>Koleksi foto pilihan</p>
</header>

<main class="gallery">
  <figure class="card">
    <img src="medali.jpeg" alt="Foto 1">
    <figcaption>Foto 1</figcaption>
  </figure>

  <figure class="card">
    <img src="medali1.jpeg" alt="Foto 2">
    <figcaption>Foto 2</figcaption>
  </figure>

  <figure class="card">
    <img src="jakarta.jpeg" alt="Foto 3">
    <figcaption>Foto 3</figcaption>
  </figure>

  <figure class="card">
    <img src="img/img4.jpg" alt="Foto 4">
    <figcaption>Foto 4</figcaption>
  </figure>
</main>

<script src="galeri.js"></script>

<!-- PREVIEW MODAL -->
<div class="preview" id="preview">
  <span class="close" id="closePreview">&times;</span>
  <img id="previewImg" alt="Preview Foto">
</div>


</body>
</html>
